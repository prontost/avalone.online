<!doctype html>
<html lang="{{ lang|default('ru') }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark light">
  <meta name="theme-color" content="#0a0c10">
  <title>{% block title %}{{ t('brand', lang=lang|default('ru')) }}{% endblock %}</title>
  <script>
  // Disable auto-translation only when running as an installed PWA. In the
  // browser we keep Google Translate available for users who don't speak any
  // of the languages we currently support (ru/en/ko).
  (function () {
    var isStandalone = window.matchMedia('(display-mode: standalone)').matches ||
                       navigator.standalone === true;
    if (isStandalone) {
      var meta = document.createElement('meta');
      meta.name = 'google';
      meta.content = 'notranslate';
      document.head.appendChild(meta);
      document.documentElement.setAttribute('translate', 'no');
    }
  })();
  </script>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" href="/icon-192.png">
  <script>
  (function(){try{var t=localStorage.getItem('avalone_theme');if(t==='light'||t==='dark')document.documentElement.dataset.theme=t;}catch(e){}})();
  </script>
  {% block extra_head %}{% endblock %}
  <link rel="stylesheet" href="/static/ui/avalone-shell.css?v={{ build_id }}">
</head>
<body data-avalone-authenticated="{{ '1' if user else '0' }}">
  {{ shell_html|safe }}

  <main class="avalone-main">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/ui/avalone-shell.js?v={{ build_id }}" defer></script>
  <script src="/static/ui/avalone-widgets.js?v={{ build_id }}" defer></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
